<style>
        body {
            background-color: var(--background);
            color: var(--on-background);
            background-image: radial-gradient(circle at top left, rgba(88, 86, 214, 0.15) 0%, transparent 40%),

            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Geist', sans-serif; /* Applied Geist globally based on request */
        }
        .glass-panel {
            background-color: var(--surface-container-low);
            border: 1px solid var(--outline-variant);
        }
        .input-glass {
            background-color: var(--surface-container-high);
            border: 1px solid var(--outline-variant);
            color: var(--on-surface);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(194, 193, 255, 0.2);
            outline: none;
        }
        .btn-gradient {
            background: linear-gradient(135deg, var(--primary-container), var(--tertiary-container));
            color: var(--on-primary);
            transition: all 0.3s ease;

<body class="p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<main class="w-full max-w-[500px] z-10">
<!-- Logo Header -->
<div class="text-center mb-10">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface mb-2 flex justify-center items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-size: 1em;">graphic_eq</span>
                Vocalize AI
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">Ambient Intelligence for Everyone</p>
</div>
<!-- Sign Up Card -->
<div class="glass-panel rounded-lg p-8 md:p-12 shadow-xl">
<h2 class="font-headline-md text-headline-md mb-8 text-on-surface">Create your account</h2>
<form class="space-y-6">
<!-- Full Name -->
<div>
<label class="block font-label-sm text-label-sm mb-2 text-on-surface-variant" for="name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md placeholder:text-outline/70" id="name" placeholder="Ada Lovelace" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-sm text-label-sm mb-2 text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md placeholder:text-outline/70" id="email" placeholder="ada@vocalize.ai" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block font-label-sm text-label-sm mb-2 text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md placeholder:text-outline/70" id="password" placeholder="••••••••" type="password"/>
</div>
<p class="mt-2 font-label-sm text-label-sm text-on-surface-variant">Must be at least 8 characters.</p>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 mt-4">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container-high text-primary focus:ring-primary focus:ring-offset-surface-dim" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-primary hover:text-primary-fixed transition-colors underline decoration-primary/30 underline-offset-4" href="#">Terms of Service</a> and <a class="text-primary hover:text-primary-fixed transition-colors underline decoration-primary/30 underline-offset-4" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Submit Button -->
<button class="btn-gradient w-full rounded-lg py-4 font-headline-md text-body-lg font-semibold mt-8 flex justify-center items-center gap-2" type="button">
                    Create Account
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="my-8 flex items-center gap-4">
<div class="flex-1 h-px bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline-variant uppercase">Or continue with</span>
<div class="flex-1 h-px bg-outline-variant"></div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex justify-center items-center gap-2 py-3 rounded-lg border border-outline-variant bg-surface-container hover:bg-surface-container-high transition-colors font-body-md text-body-md text-on-surface font-medium">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
                    Google
                </button>
<button class="flex justify-center items-center gap-2 py-3 rounded-lg border border-outline-variant bg-surface-container hover:bg-surface-container-high transition-colors font-body-md text-body-md text-on-surface font-medium">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" fill="currentColor"></path></svg>
                    GitHub
                </button>
</div>
</div>
<!-- Footer Link -->
<p class="text-center mt-8 font-body-md text-body-md text-on-surface-variant">
            Already have an account? 
            <a class="text-primary hover:text-primary-fixed transition-colors font-semibold ml-1" href="#">Log in here</a>
</p>
