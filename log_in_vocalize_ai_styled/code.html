<style>        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .glass-panel {
            background: theme('colors.surface-container-low');
            border: 1px solid theme('colors.outline-variant');
        }
        .glass-input {
            background: theme('colors.surface-container');
            border: 1px solid theme('colors.outline-variant');
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary');
        }
        .glow-btn-primary {
            background: linear-gradient(135deg, theme('colors.primary-container'), theme('colors.tertiary-container'));
            transition: all 0.3s ease;
        }
        .glow-btn-primary:hover {
            box-shadow: 0 0 20px rgba(88, 86, 214, 0.4);
            transform: translateY(-1px);
        }
        .ambient-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }</style></head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md">
<!-- Ambient Lights -->
<div class="ambient-light bg-primary-container w-[600px] h-[600px] top-[-200px] left-[-200px]"></div>
<div class="ambient-light bg-tertiary-container w-[500px] h-[500px] bottom-[-100px] right-[-100px] opacity-20"></div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[480px] px-margin-mobile md:px-0">
<!-- Logo Header -->
<div class="text-center mb-8">
<h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary mb-2">Vocalize AI</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Ambient Intelligence for Everyone.</p>
</div>
<!-- Glassmorphic Card -->
<div class="glass-panel rounded-lg p-8 shadow-xl">
<h2 class="font-headline-md text-headline-md mb-6 text-white" data-stitch-orig-opacity="0">Welcome Back</h2>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm block uppercase tracking-wider text-on-surface" data-stitch-orig-opacity="0" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="glass-input w-full rounded-DEFAULT pl-10 pr-4 py-3 text-on-surface placeholder:text-outline" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm block uppercase tracking-wider text-on-surface" data-stitch-orig-opacity="0" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-tertiary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="glass-input w-full rounded-DEFAULT pl-10 pr-4 py-3 text-on-surface placeholder:text-outline" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="glow-btn-primary w-full py-3 rounded-lg text-on-primary-container font-headline-md text-body-md font-semibold mt-8 flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
<div class="mt-8 flex items-center gap-4">
<div class="h-px flex-1 bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline">OR CONTINUE WITH</span>
<div class="h-px flex-1 bg-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="mt-6 grid grid-cols-2 gap-4">
<button class="glass-panel py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container transition-colors text-on-surface font-label-sm">
<span class="material-symbols-outlined text-outline">dataset</span>
<span class="">Google</span>
</button>
<button class="glass-panel py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container transition-colors text-on-surface font-label-sm">
<span class="material-symbols-outlined text-outline">code_blocks</span>
<span class="">GitHub</span>
</button>
</div>
<p class="mt-8 text-center font-body-md text-body-md text-on-surface-variant">
                Don't have an account? <a class="text-primary hover:text-tertiary transition-colors font-semibold" href="#">Sign up</a>
</p>
</div>
</main>
</body></html>
